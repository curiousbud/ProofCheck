# Fly.io — runs the FULL ProofCheck app (with OCR) from the Dockerfile.
#
#   fly launch --no-deploy            # creates the app (edit the name below if taken)
#   fly volumes create proofcheck_data --size 1
#   fly secrets set PROOFCHECK_SECRET=$(python -c "import secrets;print(secrets.token_hex(32))")
#   fly deploy
#
# Docs: https://fly.io/docs/reference/configuration/

app = "proofcheck"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "proofcheck_data"
  destination = "/data"

[env]
  PROOFCHECK_DB = "/data/proofcheck.db"
  PROOFCHECK_OCR_CACHE = "/data/ocr_cache"
  PROOFCHECK_AUTH = "off"
  MAX_UPLOAD_MB = "25"

# Size the VM for OCR workloads as needed.
[[vm]]
  cpus = 1
  memory = "1gb"

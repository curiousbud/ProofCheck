<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProofCheck</title>
<!--
  ProofCheck SPA — a real single-page app, but framework-free and build-free on purpose.
  The project's hard rule is "offline, no CDNs": rather than vendor a React/Vue runtime,
  this is a small hand-rolled SPA (hash router + view modules in app.js). It is still a
  disposable client: it only speaks the /api/* JSON contract, so you can replace it
  wholesale (e.g. with a bundled React build) without touching the server.
  Views: #/check (run a check), #/history (past runs), #/login (when auth is enabled).
-->
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header>
  <div class="brand">
    <h1>ProofCheck</h1>
    <p>Deterministic Excel-vs-PDF proof-reading — no AI, offline.</p>
  </div>
  <nav id="nav">
    <a href="#/check" data-route="check">Check</a>
    <a href="#/history" data-route="history">History</a>
    <span id="userBox" class="userbox hidden">
      <span id="userName" class="muted"></span>
      <button id="logoutBtn" class="link-btn">Log out</button>
    </span>
  </nav>
</header>
<main id="view"><!-- views render here --></main>
<footer class="muted" id="footer"></footer>
<script src="/static/app.js"></script>
</body>
</html>
